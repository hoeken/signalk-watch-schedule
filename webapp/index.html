<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#0b1220" />
    <title>Watch Schedule</title>
    <script>
      // Resolve the color theme before first paint to avoid a flash. Priority:
      //   1. the user's saved choice (set by the in-app toggle)
      //   2. a "mode" query param (night -> dark, anything else -> light); the
      //      Navico MFD passes this to sync the webapp with its day/night mode
      //   3. the browser / OS color-scheme preference
      // Kept dependency-free and ES5-ish so it runs on the MFD's Chromium 69.
      (function () {
        function resolveTheme() {
          try {
            var saved = localStorage.getItem("theme");
            if (saved === "dark" || saved === "light") return saved;
          } catch (e) {
            // localStorage may be blocked; fall through to the other signals.
          }
          var mode = new URLSearchParams(window.location.search).get("mode");
          if (mode !== null) return mode === "night" ? "dark" : "light";
          if (
            window.matchMedia &&
            window.matchMedia("(prefers-color-scheme: dark)").matches
          )
            return "dark";
          return "light";
        }
        document.documentElement.setAttribute("data-theme", resolveTheme());
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
